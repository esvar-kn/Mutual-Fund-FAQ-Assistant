name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # Runs at 9:00 AM IST (3:30 AM UTC) daily Monday through Friday
    - cron: '30 3 * * 1-5'
  workflow_dispatch:
    # Allows manual execution from the GitHub Actions tab

jobs:
  ingest:
    name: Run Ingestion & Publish Index
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to publish the release asset

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ingestion Pipeline
        run: python -m src.ingestion.ingestion

      - name: Verify Index Was Built
        # Fail loudly rather than publishing an empty or partial index that
        # would silently break every query in production.
        run: |
          test -f data/chromadb/chroma.sqlite3 || {
            echo "::error::Ingestion did not produce data/chromadb/chroma.sqlite3"; exit 1;
          }
          python - <<'PY'
          import chromadb
          from src.config import DB_DIR, CHROMA_COLLECTION_NAME
          col = chromadb.PersistentClient(path=str(DB_DIR)).get_collection(CHROMA_COLLECTION_NAME)
          count = col.count()
          print(f"Indexed chunks: {count}")
          assert count > 0, "collection is empty"
          PY

      - name: Package Artifacts
        run: |
          tar -czf chromadb.tar.gz -C data chromadb
          tar -czf corpus.tar.gz -C data Corpus
          ls -lh chromadb.tar.gz corpus.tar.gz

      - name: Publish Index as Rolling Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A single rolling tag keeps exactly one copy of the data, so the repo
          # never accumulates history the way committing the binaries did.
          gh release view data-latest >/dev/null 2>&1 \
            || gh release create data-latest \
                 --title "Latest vector index" \
                 --notes "Prebuilt ChromaDB index and scraped corpus. Regenerated by CI; do not edit by hand."
          gh release upload data-latest chromadb.tar.gz corpus.tar.gz --clobber

      - name: Upload Corpus for Audit
        # Short-retention copy so a bad scrape can be inspected after the fact.
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ github.run_id }}
          path: corpus.tar.gz
          retention-days: 14
