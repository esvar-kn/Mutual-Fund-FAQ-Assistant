name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # Runs at 9:20 AM IST (3:50 AM UTC) daily Monday through Friday
    - cron: '50 3 * * 1-5'
  workflow_dispatch:
    # Allows manual execution from the GitHub Actions tab

jobs:
  ingest:
    name: Run Ingestion & Rebuild Index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ingestion Pipeline
        run: |
          python src/ingestion/ingestion.py

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "Auto-update indexed mutual fund database" || echo "No changes to commit"
          git push || echo "No updates to push"
